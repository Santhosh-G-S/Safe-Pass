{% extends "layout.html" %}
{% block title %}Check Reports{% endblock %}

{% block body%}
<div class="container-fluid my-3">
  <div class="row">
    <!-- Map column -->
    <div class="col-lg-8 col-12">
      <div class="d-flex mb-2">
        <input id="filterInput" class="form-control me-2" placeholder="Filter by incident type or text (e.g. theft)" />
        <select id="typeFilter" class="form-select" style="max-width:180px;">
          <option value="">All types</option>
          <option value="theft">Theft</option>
          <option value="harassment">Harassment</option>
          <option value="hazard">Hazard</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div id="map" style="height:70vh; min-height:420px; border-radius:8px;"></div>
    </div>

    <!-- Details column -->
    <div class="col-lg-4 col-12 mt-3 mt-lg-0">
      <div class="card">
        <div class="card-body">
          <h5 id="detailTitle" class="card-title">Select a marker</h5>
          <p id="detailType" class="text-muted small"></p>
          <p id="detailAddress" class="mb-2"></p>
          <p id="detailDesc" style="white-space:pre-wrap;"></p>
          <p class="small text-muted mt-2" id="detailWhen"></p>

          <div id="noSelection" class="text-center text-muted small">
            Click or tap a marker to view details here.
          </div>
        </div>
      </div>

      <div class="mt-3">
        <button id="reloadBtn" class="btn btn-outline-primary w-100">Reload Reports</button>
      </div>
        <div class="mt-2 d-flex align-items-center justify-content-between">
        <button id="prevBtn" class="btn btn-outline-secondary btn-sm" disabled>← Prev</button>
        <small id="pageInfo" class="text-muted"></small>
        <button id="nextBtn" class="btn btn-outline-secondary btn-sm" disabled>Next →</button>
    </div>
    </div>
  </div>
</div>

<!-- Pass Google Maps key from Flask to JS -->
<div id="maps-config"
    data-maps-key="{{ google_maps_key }}"
    style="display:none;">
</div>

<!-- Load MarkerClusterer library -->
<script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

<!-- Load Google Maps API dynamically via check.js -->
<script src="{{ url_for('static', filename='check.js') }}"></script>
{% endblock %}
